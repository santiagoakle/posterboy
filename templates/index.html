<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Posterboy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 14px 16px;
      font-size: 1.1rem;
      font-weight: 600;
      flex-shrink: 0;
      letter-spacing: 0.5px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.45;
      word-break: break-word;
    }

    .bubble.me {
      background: #1a1a2e;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .bubble.them {
      background: #fff;
      color: #1a1a2e;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }

    .empty-hint {
      text-align: center;
      color: #aaa;
      font-size: 0.85rem;
      margin-top: auto;
      margin-bottom: auto;
    }

    #input-area {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #fff;
      border-top: 1px solid #ddd;
      flex-shrink: 0;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
    }

    #text-input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 1rem;
      outline: none;
      resize: none;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.4;
      background: #f8f8f8;
    }

    #text-input:focus {
      border-color: #1a1a2e;
      background: #fff;
    }

    #send-btn {
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      transition: opacity 0.15s;
    }

    #send-btn:active { opacity: 0.7; }
    #send-btn:disabled { opacity: 0.35; cursor: default; }
  </style>
</head>
<body>
  <header>Posterboy</header>

  <div id="messages">
    <p class="empty-hint">No messages yet</p>
  </div>

  <div id="input-area">
    <textarea id="text-input" rows="1" placeholder="Message…"></textarea>
    <button id="send-btn" disabled>&#9650;</button>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("text-input");
    const sendBtn = document.getElementById("send-btn");

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    let lastCount = 0;

    function renderMessages(msgs) {
      if (msgs.length === 0) {
        messagesEl.innerHTML = '<p class="empty-hint">No messages yet</p>';
        lastCount = 0;
        return;
      }
      const atBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 60;
      const hasNew = msgs.length > lastCount;
      lastCount = msgs.length;
      messagesEl.innerHTML = msgs.map(m =>
        `<div class="bubble ${m.sender === "me" ? "me" : "them"}">${escapeHtml(m.text)}</div>`
      ).join("");
      if (hasNew && atBottom) scrollToBottom();
    }

    function escapeHtml(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    async function fetchMessages() {
      try {
        const res = await fetch("/messages");
        const msgs = await res.json();
        renderMessages(msgs);
      } catch (e) { /* ignore */ }
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = "";
      inputEl.style.height = "auto";
      sendBtn.disabled = true;

      try {
        await fetch("/send", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text })
        });
        await fetchMessages();
      } catch (e) { /* ignore */ }
    }

    // Auto-resize textarea
    inputEl.addEventListener("input", () => {
      sendBtn.disabled = inputEl.value.trim() === "";
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
    });

    // Send on Enter (not Shift+Enter)
    inputEl.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        if (!sendBtn.disabled) sendMessage();
      }
    });

    sendBtn.addEventListener("click", sendMessage);

    // Poll for new messages every 2 seconds
    fetchMessages();
    setInterval(fetchMessages, 2000);
  </script>
</body>
</html>
